<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0f0a14" />
    <title>Offline — Whispers of the Throne</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: max(1rem, env(safe-area-inset-top))
          max(1rem, env(safe-area-inset-right))
          max(1rem, env(safe-area-inset-bottom))
          max(1rem, env(safe-area-inset-left));
        font-family: system-ui, sans-serif;
        background: #0f0a14;
        color: #f5e6d3;
        text-align: center;
      }
      main {
        max-width: 22rem;
      }
      h1 {
        font-size: 1.25rem;
        font-weight: 600;
      }
      p {
        font-size: 0.9rem;
        line-height: 1.5;
        opacity: 0.85;
      }
      button {
        margin-top: 1.25rem;
        min-height: 3rem;
        padding: 0 1.5rem;
        border: none;
        border-radius: 0.75rem;
        background: #c9a227;
        color: #0f0a14;
        font-size: 0.9rem;
        font-weight: 600;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You are offline</h1>
      <p>
        The court waits in silence. Reconnect to load new cards. Your saved
        progress remains on this device.
      </p>
      <button type="button" onclick="location.reload()">Try again</button>
    </main>
  </body>
</html>
